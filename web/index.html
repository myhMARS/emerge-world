<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Emergence World</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#0f1117;color:#e1e4e8;padding:24px}
h1{font-size:22px;margin-bottom:2px}
#status{color:#8b949e;font-size:13px;margin-bottom:4px;min-height:18px}
#countdown{font-size:12px;color:#8b949e;margin-bottom:12px}
.tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:6px 14px;border:1px solid #30363d;border-radius:6px;cursor:pointer;font-size:13px;background:#161b22;color:#8b949e}
.tab:hover{color:#e1e4e8}
.tab.on{background:#1f6feb33;border-color:#58a6ff;color:#58a6ff}
.panel{display:none}
.panel.on{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;cursor:pointer;transition:all .3s}
.card:hover{border-color:#58a6ff}
.card .name{font-weight:700;font-size:13px}.card .loc{color:#58a6ff;font-size:11px;margin-top:2px}
.card .stats{display:flex;gap:12px;margin-top:6px;font-size:11px;color:#8b949e}
.active-card{border-color:#58a6ff;box-shadow:0 0 8px #58a6ff33}
h2{font-size:15px;margin:16px 0 8px;border-bottom:1px solid #30363d;padding-bottom:4px}
.tl{font-size:12px;max-height:70vh;overflow-y:auto}
.tl .item{padding:5px 0;border-bottom:1px solid #21262d}
.tl .tn{color:#8b949e;margin-right:6px;font-size:10px}
.tl .agent{color:#58a6ff}.tl .rx{padding-left:16px;color:#9ea9b3;font-size:11px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f1117ee;z-index:10;display:flex;align-items:center;justify-content:center}
.modal .box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto}
.modal .close{float:right;cursor:pointer;font-size:20px;color:#8b949e;background:none;border:none}
.modal h3{font-size:18px;margin-bottom:12px}
.modal .section{margin-top:12px}
.modal .section h4{font-size:13px;color:#58a6ff;margin-bottom:4px}
.modal .section div{font-size:12px;color:#8b949e;line-height:1.6}
.ft{margin-top:12px;color:#484f58;font-size:10px;text-align:center}
</style>
</head>
<body>
<h1>Emergence World</h1>
<div id="status">Connecting...</div>
<div id="countdown"></div>

<div class="tabs">
<div class="tab on" data-panel="agents">Agents</div>
<div class="tab" data-panel="timeline">Timeline</div>
<div class="tab" data-panel="messages">Messages</div>
<div class="tab" data-panel="content">Billboard & Blog</div>
<div class="tab" data-panel="governance">Governance</div>
</div>

<div id="panel-agents" class="panel on"><div class="grid" id="agents"></div></div>
<div id="panel-timeline" class="panel"><div class="tl" id="tl"></div></div>
<div id="panel-messages" class="panel"><div class="tl" id="msgs"></div></div>
<div id="panel-content" class="panel"><h2>Billboard</h2><div class="tl" id="billboard"></div><h2>Blogs</h2><div class="tl" id="blogs"></div></div>
<div id="panel-governance" class="panel"><h2>Constitution</h2><div id="constitution" style="font-size:12px;line-height:1.8"></div><h2>Proposals</h2><div class="tl" id="proposals"></div><h2>Victory Arch</h2><div class="tl" id="pitches"></div></div>

<div class="ft">auto-refresh every 2s · click agent for details</div>
<div id="agent-modal" class="modal" style="display:none"><div class="box"></div></div>

<script>
const API='/emerge/api';
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function $(id){return document.getElementById(id)}

// Agent detail modal
function showAgent(name){
  fetch(API+'/agent/'+encodeURIComponent(name)).then(r=>r.json()).then(d=>{
    let h=`<button class="close" onclick="$('agent-modal').style.display='none'">&times;</button>`;
    h+=`<h3>${esc(d.agent.name)}</h3>`;
    h+=`<p style="font-size:12px;color:#8b949e">${esc(d.agent.location)} | E${(d.agent.energy||0)|0}% | C${(d.agent.credits||0)|1}</p>`;
    h+=`<p style="font-size:11px">${esc(d.agent.personality)}</p>`;
    if(d.soul.length){h+='<div class=section><h4>Beliefs</h4>';d.soul.forEach(s=>h+=`<div>${esc(s.content)}</div>`);h+='</div>';}
    if(d.relationships.length){h+='<div class=section><h4>Relationships</h4>';d.relationships.forEach(r=>{let o=r.agent_a===d.agent.name?r.agent_b:r.agent_a;h+=`<div>${esc(o)}: ${esc(r.rel_type)}</div>`;});h+='</div>';}
    if(d.memories.length){h+='<div class=section><h4>Memories</h4>';d.memories.slice(0,15).forEach(m=>{let t={event:'',conversation:'',thought:'',longterm:''}[m.category]||'';h+=`<div>${t} ${esc(m.content).substring(0,200)}</div>`;});h+='</div>';}
    if(d.diary.length){h+='<div class=section><h4>Diary</h4>';d.diary.slice(0,5).forEach(dd=>h+=`<div>[${dd.entry_date}] ${esc(dd.content).substring(0,200)}</div>`);h+='</div>';}
    $('agent-modal').querySelector('.box').innerHTML=h;$('agent-modal').style.display='flex';
  });
}

// Main refresh
async function refresh(){
  try{
    const r=await fetch(API+'/state');const d=await r.json();
    // Agents
    $('agents').innerHTML=d.agents.map(a=>`<div class=card onclick="showAgent('${esc(a.name)}')"><div class=name>${esc(a.name)}</div><div class=loc>${esc(a.location)}</div><div class=stats><span>E${(a.energy||0)|0}%</span><span>C${(a.credits||0)|1}</span></div></div>`).join('');
    // Timeline
    $('tl').innerHTML=d.turns.map(t=>{let rx=(t.response_summary||'').startsWith('[反应]');return`<div class="item${rx?' rx':''}"><span class=tn>${rx?'↳':''}T${t.turn_number}</span><span class=agent>${esc(t.agent_name)}</span> → ${esc((t.response_summary||'').replace('[反应] ','').substring(0,200))}</div>`;}).join('');
    // Messages
    $('msgs').innerHTML=d.messages.map(m=>`<div class=item><span class=agent>${esc(m.from_agent)}</span> → ${esc(m.to_agent)}: ${esc((m.content||'').substring(0,200))}</div>`).join('');
    // Status
    $('status').innerHTML=`${d.agents.length} agents | ${d.turns.length} turns | Live`;
    // Countdown
    if(d.last_turn_time){let lt=new Date(d.last_turn_time+'Z').getTime(),nxt=lt+d.turn_interval*1000,rem=Math.max(0,Math.floor((nxt-Date.now())/1000));if(rem<=0)$('countdown').textContent='Next turn: any moment...';else{let m=Math.floor(rem/60),s=rem%60;$('countdown').textContent=`Next turn in: ${m}:${String(s).padStart(2,'0')}`;}}
  }catch(e){$('status').textContent='Offline - retrying...';}
}

// Content tab
async function loadContent(){
  try{const r=await fetch(API+'/billboard');const d=await r.json();
  $('billboard').innerHTML=d.billboard.map(p=>{let rp=(p.replies||[]).map(r=>`<div class=rx>${esc(r.replier)}: ${esc(r.content).substring(0,150)}</div>`).join('');return`<div class=item><b>${esc(p.poster)}</b> [${esc(p.category)}]: ${esc(p.content).substring(0,300)}${rp}</div>`;}).join('')||'none';
  $('blogs').innerHTML=d.blogs.map(b=>{let cm=(b.comments||[]).map(c=>`<div class=rx>${esc(c.commenter)}: ${esc(c.content).substring(0,150)}</div>`).join('');return`<div class=item><b>${esc(b.author)}</b> - ${esc(b.title)}: ${esc(b.content).substring(0,200)}${cm}</div>`;}).join('')||'none';
  }catch(e){}
}

// Governance tab
async function loadGov(){
  try{const r=await fetch(API+'/governance');const d=await r.json();
  $('constitution').innerHTML=d.constitution.articles.map(a=>`<div>${esc(a)}</div>`).join('');
  $('proposals').innerHTML=d.proposals.map(p=>`<div class=item><b>#${p.id}</b> [${esc(p.category)}] ${esc(p.proposer)}: ${esc(p.title)} (${p.yes_votes}Y/${p.no_votes}N, ${p.status})</div>`).join('')||'none';
  $('pitches').innerHTML=d.pitches.map(p=>`<div class=item><b>#${p.id}</b> ${esc(p.pitcher)}: ${esc(p.title)} - ${p.votes} votes</div>`).join('')||'none';
  }catch(e){}
}

// Tab switching
document.querySelectorAll('.tab').forEach(t=>{t.onclick=()=>{
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  $('panel-'+t.dataset.panel).classList.add('on');t.classList.add('on');
  if(t.dataset.panel==='content')loadContent();
  if(t.dataset.panel==='governance')loadGov();
};});

refresh();setInterval(refresh,2000);
</script>
</body>
</html>
